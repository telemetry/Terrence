<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
  <link rel="shortcut icon" href="/favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
  <link rel="manifest" href="/favicon/site.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inclusive+Sans:ital,wght@0,300..700;1,300..700&family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

  <title>Terry Gillespie - Design Engineer with over 20 Years experience</title>
  <script>(function(){var t=localStorage.getItem('theme');if(t==='dark'||(!t&&matchMedia('(prefers-color-scheme:dark)').matches))document.documentElement.classList.add('dark')})()</script>
  <style>
    /* ---- Tokens ---- */
    :root {
      /* Colors */
      --background: #F9F6EE;
      --foreground: #0a131d;
      --muted: #FAF9F6;
      --muted-foreground: slategray;
      --accent: #3da12a;
      --accent-foreground: whitesmoke;
      --accent-gradient: linear-gradient(to right, #5c5ef2, #da8bd0);
      --border: slategray;
      --ring: yellow;

      /* Typography */
      --font-sans: "Inclusive Sans", -apple-system, BlinkMacSystemFont, avenir next, avenir, segoe ui, helvetica neue, helvetica, Cantarell, Ubuntu, roboto, noto, arial, sans-serif;
      --text-xs: 0.75rem;
      --text-sm: 0.875rem;
      --text-base: 1rem;
      --text-lg: 1.25rem;
      --text-xl: 1.5rem;
      --text-2xl: 2rem;
      --text-3xl: 2.25rem;
      --text-4xl: 3rem;
      --text-5xl: 4.5rem;

      --leading-none: 1;
      --leading-tight: 1.15;
      --leading-snug: 1.25;
      --leading-normal: 1.5;
      --leading-relaxed: 1.625;

      --tracking-tight: -0.025em;
      --tracking-normal: 0;
      --tracking-wide: 0.05em;

      --font-thin: 200;
      --font-light: 300;
      --font-normal: 400;

      /* Spacing */
      --spacing-0: 0;
      --spacing-0.5: 0.125rem;
      --spacing-1: 0.25rem;
      --spacing-1.5: 0.375rem;
      --spacing-2: 0.5rem;
      --spacing-3: 0.75rem;
      --spacing-4: 1rem;
      --spacing-5: 1.25rem;
      --spacing-6: 1.5rem;
      --spacing-8: 2rem;
      --spacing-10: 2.5rem;
      --spacing-12: 3rem;
      --spacing-16: 4rem;
      --spacing-20: 5rem;
      --spacing-24: 6rem;

      /* Radius */
      --radius-sm: 0.25rem;
      --radius-md: 0.375rem;
      --radius-lg: 0.5rem;
      --radius-full: 9999px;

      /* Layout */
      --max-width: 90rem;
    }

    /* Dark mode */
    :root.dark {
      --background: #0a131d;
      --foreground: #E8E4DD;
      --muted: #161f2b;
      --muted-foreground: #8893a2;
      --border: #2a3545;
      --ring: #52c234;
    }

    /* Theme toggle */
    .theme-toggle {
      position: fixed;
      top: 24px;
      right: 24px;
      width: 36px;
      height: 36px;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--muted-foreground);
      padding: 6px;
      border-radius: 50%;
      transition: color 0.2s;
      z-index: 10;
    }

    .theme-toggle:hover {
      color: var(--foreground);
    }

    .theme-toggle svg {
      width: 24px;
      height: 24px;
    }

    .theme-toggle .icon-moon { display: none; }
    :root.dark .theme-toggle .icon-sun { display: none; }
    :root.dark .theme-toggle .icon-moon { display: block; }

    /* ---- Reset ---- */
    *, *::before, *::after { box-sizing: border-box; }

    body, h1, h2, h3, h4, p, figure, blockquote, dl, dd { margin: 0; }

    ul[role="list"], ol[role="list"] { list-style: none; }

    html { scroll-behavior: smooth; }

    img, picture { max-width: 100%; display: block; }

    input, button, textarea, select { font: inherit; }

    ::-moz-selection {
      color: whitesmoke;
      background: var(--ring);
    }

    ::selection {
      background: var(--ring);
    }

    a:not([class]) {
      text-decoration-skip-ink: auto;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    /* ---- Base ---- */
    body {
      font-family: var(--font-sans);
      color: var(--foreground);
      background-color: var(--background);
      min-height: 100vh;
      line-height: var(--leading-normal);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 var(--spacing-12);
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 50px 100px;
    }

    /* ---- Layout ---- */
    header, footer {
      padding: var(--spacing-6) 0;
      grid-column: 1 / 3;
    }

    footer p {
      margin: 0 0 var(--spacing-6) 0;
    }

    section {
      padding: var(--spacing-6) 0 var(--spacing-3) 0;
      border-bottom: 1px dashed var(--border);
    }

    .fullwidth {
      grid-column: 1 / 3;
    }

    /* ---- Typography ---- */
    h1 {
      font-size: var(--text-5xl);
      font-weight: var(--font-light);
      line-height: 64px;
      letter-spacing: var(--tracking-tight);
      margin-bottom: var(--spacing-10);
    }

    h2 {
      font-size: var(--text-3xl);
      font-weight: var(--font-thin);
      line-height: var(--leading-tight);
      margin-top: 2px;
      margin-bottom: var(--spacing-8);
    }

    h4 {
      font-size: var(--text-sm);
      font-weight: var(--font-light);
      line-height: var(--leading-normal);
      letter-spacing: var(--tracking-wide);
      text-transform: uppercase;
      color: var(--accent-foreground);
      margin-bottom: var(--spacing-2);
    }

    p {
      font-size: var(--text-lg);
      font-weight: var(--font-thin);
      line-height: var(--leading-snug);
      margin-bottom: var(--spacing-2);
    }

    pre {
      color: gray;
      background: var(--muted);
      width: auto;
      padding: 5px;
      border-radius: 5px;
      display: inline;
      margin-bottom: var(--spacing-4);
    }

    /* ---- Components ---- */
    .highlight {
      color: var(--accent-foreground);
      background-image: var(--accent-gradient);
      padding: 10px 15px;
      border-radius: 25px;
      font-size: var(--text-sm);
      margin: 0 36px 36px 0;
    }

    .headingHighlight {
      background-color: var(--accent);
      padding: 2px 6px;
      border-radius: 5px;
      font-weight: 100;
    }

    .nextHeading {
      margin-top: var(--spacing-6);
    }

    /* ---- Links ---- */
    a {
      color: var(--foreground);
    }

    a:hover {
      background-color: var(--muted);
    }

    /* ---- Breakpoints ---- */
    @media (max-width: 1024px) {
      body {
        padding: var(--spacing-8) var(--spacing-12);
      }
    }

    @media (max-width: 640px) {
      body {
        padding: var(--spacing-4);
        grid-template-columns: 1fr;
      }

      header, footer {
        text-align: left;
        width: 100%;
        grid-column: 1;
      }

      section {
        grid-column: 1;
      }

      .fullwidth {
        grid-column: 1;
      }

      h1 {
        font-size: var(--text-4xl);
        margin-bottom: var(--spacing-8);
      }

      h2 {
        font-size: var(--text-2xl);
        margin-bottom: var(--spacing-6);
      }
    }
  </style>
</head>

<body>
  <header>
    <section class="fullwidth">
      {{content}}
      <p>This is the links archive. <a href="/">Return home</a>.</p>
    </section>
  </header>

  <section>
    <h4><span class="headingHighlight">Reading</span></h4>
    {% for post in site.categories.reading%}
    <h2><a href="{{ post.external_url }}" target="_blank" rel="noopener">{{ post.title }}</a></h2>
    {% endfor %}
  </section>
  <section>
    <h4><span class="headingHighlight">Watching</span></h4>
    {% for post in site.categories.watching%}
    <h2><a href="{{ post.external_url }}" target="_blank" rel="noopener">{{ post.title }}</a></h2>
    {% endfor %}
  </section>
  <footer>
    <section>
      <p>This is the links archive. <a href="/">Return home</a>.</p>
      <p><span class="highlight nextHeading">Digital Presence &mdash; Since 1998</span></p>
    </section>
  </footer>
  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>
  <script>
    function toggleTheme() {
      var isDark = document.documentElement.classList.toggle('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }
  </script>
</body>

</html>
