<!-- Concentric Clock — Vanilla JS/CSS/HTML port -->
<div class="concentric-clock" id="concentric">
  <div class="concentric-mask">
    <div class="concentric-ring" id="concentric-ring">
      <svg class="concentric-svg" viewBox="0 0 200 200">
        <circle cx="100" cy="100" r="90" fill="none" stroke="white" stroke-width="20" opacity="0.9"/>
      </svg>
      <div class="concentric-dot" id="concentric-dot">
        <span class="concentric-hour" id="concentric-hour"></span>
      </div>
    </div>
  </div>
</div>

<style>
  .concentric-clock {
    width: 100%;
    height: 100%;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .concentric-mask {
    width: 200px;
    height: 200px;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
  }

  .concentric-ring {
    width: 200px;
    height: 200px;
    position: absolute;
    top: -10px;
    left: 0;
    transition: transform 0.5s ease-in-out;
  }

  .concentric-svg {
    width: 200px;
    height: 200px;
  }

  .concentric-dot {
    position: absolute;
    width: 50px;
    height: 50px;
    background: rgba(255, 59, 48, 0.9);
    border-radius: 50%;
    top: -15px;
    left: 75px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.5s ease-in-out;
  }

  .concentric-hour {
    color: white;
    font-family: -apple-system, system-ui, sans-serif;
    font-size: 22px;
    font-weight: 500;
    transition: transform 0.5s ease-in-out;
  }
</style>

<script>
  (function() {
    function updateConcentric() {
      const now = new Date();
      const min = now.getMinutes();
      const hour = now.getHours();
      const angle = min * 6;

      const ring = document.getElementById('concentric-ring');
      const dot = document.getElementById('concentric-dot');
      const hourEl = document.getElementById('concentric-hour');

      if (!ring) return;

      // Ring rotates by minutes
      ring.style.transform = `rotate(${angle}deg)`;
      // Dot counter-rotates so hour text stays upright
      // The dot is already part of the ring, so it rotates with it
      // We counter-rotate the text only
      hourEl.style.transform = `rotate(${-angle}deg)`;
      hourEl.textContent = hour;
    }

    updateConcentric();
    setInterval(updateConcentric, 1000);
  })();
</script>
